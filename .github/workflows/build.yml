name: Build Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: pyinstaller --clean "SafetyCulture Tools.spec"

      - name: Ad-hoc code sign
        run: |
          # Remove any quarantine attributes left over from the build
          xattr -cr "dist/SafetyCulture Tools.app"

          # Sign every .so / .dylib inside the bundle individually first,
          # then sign the main executable and the .app wrapper.  This is
          # more reliable than --deep for PyInstaller bundles which place
          # hundreds of shared libraries in a flat directory.
          find "dist/SafetyCulture Tools.app" -type f \
            \( -name "*.so" -o -name "*.dylib" \) \
            -exec codesign --force --sign - {} +

          codesign --force --sign - \
            "dist/SafetyCulture Tools.app/Contents/MacOS/SafetyCulture Tools"
          codesign --force --sign - "dist/SafetyCulture Tools.app"

          # Verify the signature is valid
          codesign --verify --verbose "dist/SafetyCulture Tools.app"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "SafetyCulture Tools" \
            -srcfolder "dist/SafetyCulture Tools.app" \
            -ov -format UDZO \
            "dist/SafetyCulture-Tools-Mac.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/SafetyCulture-Tools-Mac.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: pyinstaller --clean "SafetyCulture Tools.spec"

      - name: Create ZIP
        run: |
          Compress-Archive -Path "dist\SafetyCulture Tools" -DestinationPath "dist\SafetyCulture-Tools-Windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/SafetyCulture-Tools-Windows.zip

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Set release tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "name=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Delete existing latest release and tag (workflow_dispatch only)
        if: ${{ github.ref_type != 'tag' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag \
            --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          files: |
            mac-dmg/SafetyCulture-Tools-Mac.dmg
            windows-zip/SafetyCulture-Tools-Windows.zip
